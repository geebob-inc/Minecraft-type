<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft 3-Tab Inventory</title>

<style>
body{margin:0;background:#000;font-family:monospace;color:white}

/* HOTBAR ALWAYS ON SCREEN */
#hotbar{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:4px;
}

/* INVENTORY WINDOW */
#ui{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:#c6c6c6;
border:4px solid #555;
padding:10px;
display:none;
flex-direction:column;
gap:10px;
color:black;
}

/* TAB BUTTONS */
#tabs{
display:flex;
gap:5px;
}

.tab{
padding:5px;
background:#888;
cursor:pointer;
border:2px solid #444;
}

.tab.active{
background:#aaa;
}

/* PANELS */
.panel{
display:none;
}

.panel.active{
display:grid;
grid-template-columns:repeat(9,40px);
gap:4px;
}

/* CRAFTING GRID */
#craftGrid{
grid-template-columns:repeat(3,40px);
}

/* SLOT */
.slot{
width:40px;
height:40px;
background:#8b8b8b;
border:2px solid #3a3a3a;
display:flex;
align-items:center;
justify-content:center;
position:relative;
cursor:pointer;
user-select:none;
}

.count{
position:absolute;
bottom:2px;
right:4px;
font-size:10px;
}

</style>
</head>
<body>

<!-- HOTBAR -->
<div id="hotbar"></div>

<!-- INVENTORY UI -->
<div id="ui">

<div id="tabs">
<div class="tab active" onclick="openTab(0)">Inventory</div>
<div class="tab" onclick="openTab(1)">Craft</div>
<div class="tab" onclick="openTab(2)">Info</div>
</div>

<!-- TAB 1 -->
<div id="invGrid" class="panel active"></div>

<!-- TAB 2 -->
<div id="craftGrid" class="panel"></div>

<!-- TAB 3 (simple placeholder like Minecraft help panel) -->
<div id="infoPanel" class="panel">
Controls:<br>
E = open inventory<br>
Shift = quick move<br>
Click = swap
</div>

</div>

<script>

//////////////////////////////
// ICONS
//////////////////////////////

const icons={
wood:"🪵",
stick:"🪶",
sword:"🗡️",
meat:"🍖"
};

//////////////////////////////
// INVENTORY SYSTEM
//////////////////////////////

let inventory=Array(36).fill(null).map(()=>({id:null,count:0}));
let crafting=Array(9).fill(null).map(()=>({id:null,count:0}));

//////////////////////////////
// ADD ITEM (STACKING)
//////////////////////////////

function addItem(id,amount=1){

for(let s of inventory){
if(s.id===id && s.count<64){
s.count+=amount;
return;
}
}

for(let s of inventory){
if(!s.id){
s.id=id;
s.count=amount;
return;
}
}

}

//////////////////////////////
// SHIFT MOVE (MINECRAFT STYLE)
//////////////////////////////

function shiftMove(from,to){

if(!from.id) return;

if(!to.id){
to.id=from.id;
to.count=from.count;
from.id=null;
from.count=0;
return;
}

if(to.id===from.id){

let total=to.count+from.count;
to.count=Math.min(64,total);
from.count=total>64?total-64:0;

if(from.count===0){
from.id=null;
}

}

}

//////////////////////////////
// SLOT RENDER
//////////////////////////////

function slot(item,index,type){

const d=document.createElement("div");
d.className="slot";

if(item.id){
d.innerHTML=`
<div>${icons[item.id]||"?"}</div>
${item.count>1?`<div class="count">${item.count}</div>`:""}
`;
}

d.onclick=(e)=>{

if(e.shiftKey){

if(type==="inv") shiftMove(inventory[index],inventory[0]);
if(type==="craft") shiftMove(crafting[index],inventory[0]);

render();
return;
}

// swap
if(type==="inv"){
let t=inventory[0];
inventory[0]=inventory[index];
inventory[index]=t;
}

if(type==="craft"){
let t=crafting[0];
crafting[0]=crafting[index];
crafting[index]=t;
}

render();

};

return d;

}

//////////////////////////////
// RENDER UI
//////////////////////////////

function render(){

// inventory
let inv=document.getElementById("invGrid");
inv.innerHTML="";
inventory.forEach((i,idx)=>inv.appendChild(slot(i,idx,"inv")));

// crafting
let craft=document.getElementById("craftGrid");
craft.innerHTML="";
crafting.forEach((i,idx)=>craft.appendChild(slot(i,idx,"craft")));

// hotbar
let hot=document.getElementById("hotbar");
hot.innerHTML="";
inventory.slice(0,9).forEach(i=>{
let d=document.createElement("div");
d.className="slot";
d.innerHTML=i.id?icons[i.id]+" "+(i.count>1?i.count:""):"";
hot.appendChild(d);
});

}

//////////////////////////////
// TABS (MAX 3 LIKE YOU ASKED)
//////////////////////////////

function openTab(i){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".panel")[i].classList.add("active");
document.querySelectorAll(".tab")[i].classList.add("active");

}

//////////////////////////////
// OPEN INVENTORY
//////////////////////////////

addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="e"){
let ui=document.getElementById("ui");
ui.style.display=ui.style.display==="none"?"flex":"none";
}
});

//////////////////////////////
// TEST ITEMS
//////////////////////////////

addItem("wood",20);
addItem("stick",10);
addItem("meat",5);

render();

</script>

</body>
</html>
