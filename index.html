<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Voxel Engine - Better Graphics</title>
<style>
body { margin:0; overflow:hidden; cursor:crosshair; }
canvas { display:block; }

#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  width:6px;
  height:6px;
  background:white;
  transform:translate(-50%,-50%);
  border-radius:50%;
}
</style>
</head>
<body>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===================== SCENE =====================
const scene = new THREE.Scene();

// 🌫 better fog (huge visual upgrade)
scene.fog = new THREE.Fog(0xa0d8ff, 15, 90);

// 🌈 sky color
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// ☀️ fake sun lighting (important for Minecraft feel)
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(1,1,0.5);
scene.add(sun);

// ambient fill light
scene.add(new THREE.AmbientLight(0x666666));

// ===================== PLAYER =====================
let player = { x:0,y:10,z:0,vy:0,onGround:false };

// ===================== MOVEMENT =====================
let playerVel = {x:0,z:0};

const maxSpeed = 0.12;
const sprintSpeed = 0.20;
const accel = 0.02;
const friction = 0.85;
const gravity = -0.015;
const jumpPower = 0.30;

// ===================== WORLD =====================
const CHUNK=16;
const RENDER=2;
let chunks={};
let voxels=new Map();

const geo=new THREE.BoxGeometry(1,1,1);

// ===================== HEIGHT =====================
function height(x,z){
  return Math.floor(
    Math.sin(x*0.2)*3 +
    Math.cos(z*0.2)*3 + 7
  );
}

// ===================== 🎨 REAL TEXTURE FEEL =====================

// grass (top + blend)
function texGrass(){
  let c=document.createElement("canvas");
  c.width=c.height=32;
  let g=c.getContext("2d");

  g.fillStyle="#3cb043";
  g.fillRect(0,0,32,32);

  // noise dots = better look
  for(let i=0;i<60;i++){
    g.fillStyle="rgba(0,0,0,0.1)";
    g.fillRect(Math.random()*32,Math.random()*32,2,2);
  }

  return new THREE.CanvasTexture(c);
}

// dirt
function texDirt(){
  let c=document.createElement("canvas");
  c.width=c.height=32;
  let g=c.getContext("2d");

  g.fillStyle="#8B5A2B";
  g.fillRect(0,0,32,32);

  for(let i=0;i<40;i++){
    g.fillStyle="rgba(0,0,0,0.15)";
    g.fillRect(Math.random()*32,Math.random()*32,2,2);
  }

  return new THREE.CanvasTexture(c);
}

// stone
function texStone(){
  let c=document.createElement("canvas");
  c.width=c.height=32;
  let g=c.getContext("2d");

  g.fillStyle="#777";
  g.fillRect(0,0,32,32);

  for(let i=0;i<50;i++){
    g.fillStyle="rgba(0,0,0,0.2)";
    g.fillRect(Math.random()*32,Math.random()*32,2,2);
  }

  return new THREE.CanvasTexture(c);
}

// ===================== MATERIALS =====================
const mats={
  grass:new THREE.MeshLambertMaterial({map:texGrass()}),
  dirt:new THREE.MeshLambertMaterial({map:texDirt()}),
  stone:new THREE.MeshLambertMaterial({map:texStone()})
};

// ===================== BLOCK =====================
function key(x,y,z){return x+","+y+","+z;}

function addBlock(x,y,z,type){
  let m=new THREE.Mesh(geo,mats[type]);
  m.position.set(x,y,z);
  scene.add(m);
  voxels.set(key(x,y,z),1);
}

// ===================== CHUNKS =====================
function buildChunk(cx,cz){

  let id=cx+","+cz;
  if(chunks[id]) return;

  let list=[];

  for(let x=0;x<CHUNK;x++){
    for(let z=0;z<CHUNK;z++){

      let wx=cx*CHUNK+x;
      let wz=cz*CHUNK+z;

      let h=height(wx,wz);

      for(let y=0;y<h;y++){
        let t="stone";
        if(y===h-1) t="grass";
        else if(y>h-3) t="dirt";

        list.push(addBlock(wx,y,wz,t));
      }
    }
  }

  chunks[id]=list;
}

// unload
function unload(cx,cz){
  for(let id in chunks){
    let [x,z]=id.split(",").map(Number);
    if(Math.abs(x-cx)>RENDER||Math.abs(z-cz)>RENDER){
      chunks[id].forEach(b=>scene.remove(b));
      delete chunks[id];
    }
  }
}

// ===================== INPUT =====================
let keys={};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// mouse
let yaw=0,pitch=0;

document.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement){
    yaw-=e.movementX*0.002;
    pitch-=e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
  }
});

// ===================== COLLISION =====================
function solid(x,y,z){
  return voxels.has(key(Math.round(x),Math.round(y),Math.round(z)));
}

// ===================== PLAYER UPDATE =====================
function updatePlayer(){

  let speed = keys["ShiftLeft"] ? sprintSpeed : maxSpeed;

  let forward = (keys["KeyW"]?1:0)-(keys["KeyS"]?1:0);
  let strafe  = (keys["KeyD"]?1:0)-(keys["KeyA"]?1:0);

  let sin=Math.sin(yaw);
  let cos=Math.cos(yaw);

  let dx=(sin*forward + cos*strafe);
  let dz=(cos*forward - sin*strafe);

  let len=Math.sqrt(dx*dx+dz*dz);
  if(len>0){dx/=len;dz/=len;}

  playerVel.x += dx*accel;
  playerVel.z += dz*accel;

  let vlen=Math.sqrt(playerVel.x**2 + playerVel.z**2);
  if(vlen>speed){
    playerVel.x=(playerVel.x/vlen)*speed;
    playerVel.z=(playerVel.z/vlen)*speed;
  }

  playerVel.x*=friction;
  playerVel.z*=friction;

  let nx=player.x+playerVel.x;
  let nz=player.z+playerVel.z;

  if(!solid(nx,player.y,nz)){
    player.x=nx;
    player.z=nz;
  }

  // jump
  if(keys["Space"] && player.onGround){
    player.vy=jumpPower;
    player.onGround=false;
  }

  // gravity
  player.vy+=gravity;
  player.y+=player.vy;

  let g=height(player.x,player.z);
  if(player.y<g){
    player.y=g;
    player.vy=0;
    player.onGround=true;
  }

  camera.position.set(player.x,player.y+1.6,player.z);
  camera.rotation.set(pitch,yaw,0);
}

// ===================== LOOP =====================
function loop(){

  requestAnimationFrame(loop);

  let cx=Math.floor(player.x/CHUNK);
  let cz=Math.floor(player.z/CHUNK);

  for(let x=-RENDER;x<=RENDER;x++){
    for(let z=-RENDER;z<=RENDER;z++){
      buildChunk(cx+x,cz+z);
    }
  }

  unload(cx,cz);

  updatePlayer();

  renderer.render(scene,camera);
}

loop();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
