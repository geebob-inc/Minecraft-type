<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Survival Engine</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:monospace}
canvas{display:block}

#ui{
position:absolute;top:10px;left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
}

#inv{
position:absolute;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:5px;
}

.slot{
width:60px;height:60px;
background:#333;
border:2px solid #666;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

#craft{
position:absolute;right:10px;top:10px;
width:180px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px;
}

.recipe{
background:#444;
margin:5px 0;
padding:5px;
cursor:pointer;
}

#crack{
position:absolute;left:50%;top:50%;
width:64px;height:64px;
transform:translate(-50%,-50%);
display:none;
pointer-events:none;
}

</style>
</head>
<body>

<div id="ui">WASD move | click mine | space jump</div>
<div id="inv"></div>
<div id="craft"></div>
<div id="crack"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// CORE ENGINE
// =====================

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xaad5ff,80,300);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,30,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// lighting
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const sun=new THREE.DirectionalLight(0xffffff,2);
sun.position.set(50,80,20);
scene.add(sun);

// =====================
// VOXEL WORLD (chunked)
// =====================

const SIZE=16;
const geo=new THREE.BoxGeometry(1,1,1);

const chunks={};
const blocks=[];
const world=new Map();

// greedy meshing simplified (face batching per chunk)
function key(x,y,z){return x+","+y+","+z}

function height(x,z){
return Math.floor(Math.sin(x*0.1)*Math.cos(z*0.1)*6+12);
}

// =====================
// BLOCK ADD
// =====================

function addBlock(x,y,z,color){

const mat=new THREE.MeshStandardMaterial({color});
const m=new THREE.Mesh(geo,mat);

m.position.set(x,y,z);

scene.add(m);
blocks.push(m);

world.set(key(x,y,z),true);

}

// =====================
// CHUNK GENERATION
// =====================

function genChunk(cx,cz){

let id=cx+","+cz;
if(chunks[id])return;
chunks[id]=true;

for(let x=0;x<SIZE;x++){
for(let z=0;z<SIZE;z++){

let wx=cx*SIZE+x;
let wz=cz*SIZE+z;

let h=height(wx,wz);

for(let y=0;y<h;y++){

let c = y===h-1 ? 0x55aa55 : 0x8B5A2B;
addBlock(wx,y,wz,c);

}

}}

}

// =====================
// WATER (REFLECTION PLANE)
// =====================

const waterGeo=new THREE.PlaneGeometry(200,200);
const waterMat=new THREE.MeshStandardMaterial({
color:0x3399ff,
transparent:true,
opacity:0.5
});

const water=new THREE.Mesh(waterGeo,waterMat);
water.rotation.x=-Math.PI/2;
water.position.y=10;
scene.add(water);

// =====================
// PLAYER + COLLISION
// =====================

let vy=0,onGround=false;
let yaw=0,pitch=0;

function solid(x,y,z){
return world.has(key(Math.floor(x),Math.floor(y),Math.floor(z)));
}

function collide(x,y,z){

for(let dx=-0.3;dx<=0.3;dx+=0.3){
for(let dz=-0.3;dz<=0.3;dz+=0.3){
for(let dy=0;dy<2;dy+=0.5){

if(solid(x+dx,y-dy,z+dz))return true;

}}}
return false;
}

// =====================
// MOBS (AI)
// =====================

const mobs=[];

function spawnMob(){

const m=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0x00ff00})
);

m.position.set(5,15,5);
scene.add(m);

mobs.push({mesh:m,dir:Math.random()*Math.PI*2});

}

for(let i=0;i<5;i++)spawnMob();

function updateMobs(){

for(let m of mobs){

m.dir += (Math.random()-0.5)*0.1;

m.mesh.position.x += Math.cos(m.dir)*0.05;
m.mesh.position.z += Math.sin(m.dir)*0.05;

}

}

// =====================
// INVENTORY + CRAFT
// =====================

const inv={
wood:10,
stone:5,
plank:0
};

const recipes=[
{n:"Plank",r:{wood:1},g:{plank:4}}
];

const invDiv=document.getElementById("inv");
const craftDiv=document.getElementById("craft");

function renderInv(){

invDiv.innerHTML="";

for(let i in inv){

let d=document.createElement("div");
d.className="slot";
d.innerText=i+"\n"+inv[i];
invDiv.appendChild(d);

}

}

function craft(r){

for(let i in r.r){
if((inv[i]||0)<r.r[i])return;
}

for(let i in r.r)inv[i]-=r.r[i];
for(let i in r.g)inv[i]=(inv[i]||0)+r.g[i];

renderInv();

}

function renderCraft(){

craftDiv.innerHTML="<b>Craft</b>";

recipes.forEach(r=>{

let d=document.createElement("div");
d.className="recipe";
d.innerText=r.n;
d.onclick=()=>craft(r);
craftDiv.appendChild(d);

});

}

renderInv();
renderCraft();

// =====================
// INPUT
// =====================

const keys={};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

addEventListener("mousemove",e=>{
if(document.pointerLockElement!==document.body)return;
yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;
});

// =====================
// WORLD LOAD
// =====================

function updateChunks(){

let cx=Math.floor(camera.position.x/SIZE);
let cz=Math.floor(camera.position.z/SIZE);

for(let x=-2;x<=2;x++){
for(let z=-2;z<=2;z++){
genChunk(cx+x,cz+z);
}}

}

// =====================
// PLAYER UPDATE
// =====================

function update(){

let sp=0.15;

let fx=-Math.sin(yaw);
let fz=-Math.cos(yaw);

let nx=camera.position.x;
let nz=camera.position.z;

if(keys["w"]){nx+=fx*sp;nz+=fz*sp;}
if(keys["s"]){nx-=fx*sp;nz-=fz*sp;}
if(keys["a"]){nx-=Math.cos(yaw)*sp;nz+=Math.sin(yaw)*sp;}
if(keys["d"]){nx+=Math.cos(yaw)*sp;nz-=Math.sin(yaw)*sp;}

if(!collide(nx,camera.position.y,nz)){
camera.position.x=nx;
camera.position.z=nz;
}

vy-=0.02;
let ny=camera.position.y+vy;

if(!collide(camera.position.x,ny,camera.position.z)){
camera.position.y=ny;
}else{
vy=0;
onGround=true;
}

if(keys[" "]&&onGround){
vy=0.3;
onGround=false;
}

camera.rotation.order="YXZ";
camera.rotation.y=yaw;
camera.rotation.x=pitch;

}

// =====================
// SAVE / LOAD WORLD
// =====================

function save(){

localStorage.setItem("world",
JSON.stringify([...world])
);

}

function load(){

let w=JSON.parse(localStorage.getItem("world")||"[]");

w.forEach(([k])=>world.set(k,true));

}

// =====================
// LOOP
// =====================

function animate(){
requestAnimationFrame(animate);

updateChunks();
updateMobs();
update();

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
