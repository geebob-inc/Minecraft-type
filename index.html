<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultra HD Voxel Engine</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

canvas{
  display:block;
}

#crosshair{
  position:fixed;
  left:50%;
  top:50%;
  width:10px;
  height:10px;
  transform:translate(-50%,-50%);
  border:2px solid white;
  border-radius:50%;
  box-shadow:
    0 0 5px white,
    0 0 15px white;
  pointer-events:none;
}

#hud{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-size:14px;
  text-shadow:0 0 5px black;
}
</style>
</head>
<body>

<div id="crosshair"></div>
<div id="hud">
W = Forward<br>
S = Backward<br>
A = Left<br>
D = Right<br>
SHIFT = Sprint<br>
SPACE = Jump
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ======================================================
// SCENE
// ======================================================

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87CEEB);

scene.fog = new THREE.FogExp2(0xbfdfff, 0.012);

// ======================================================
// CAMERA
// ======================================================

const camera = new THREE.PerspectiveCamera(
  80,
  innerWidth / innerHeight,
  0.1,
  2000
);

// ======================================================
// RENDERER
// ======================================================

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  powerPreference:"high-performance"
});

renderer.setSize(innerWidth, innerHeight);

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);

// ======================================================
// LIGHTING
// ======================================================

const hemi = new THREE.HemisphereLight(
  0xffffff,
  0x445566,
  1.6
);

scene.add(hemi);

const sun = new THREE.DirectionalLight(
  0xffffff,
  2.2
);

sun.position.set(100,120,60);

sun.castShadow = true;

sun.shadow.mapSize.width = 4096;
sun.shadow.mapSize.height = 4096;

sun.shadow.camera.left = -120;
sun.shadow.camera.right = 120;
sun.shadow.camera.top = 120;
sun.shadow.camera.bottom = -120;

sun.shadow.bias = -0.0001;

scene.add(sun);

// ======================================================
// FPS RIG
// ======================================================

const playerYaw = new THREE.Object3D();
const playerPitch = new THREE.Object3D();

playerPitch.add(camera);
playerYaw.add(playerPitch);

scene.add(playerYaw);

// ======================================================
// PLAYER
// ======================================================

const PLAYER_HEIGHT = 2;

const player = {
  x:0,
  y:25,
  z:0,
  vy:0,
  onGround:false
};

const eyeHeight = 1.7;

// ======================================================
// MOVEMENT
// ======================================================

const keys = {};

let vel = {
  x:0,
  z:0
};

const walkSpeed = 0.12;
const sprintSpeed = 0.22;

const accel = 0.028;
const friction = 0.82;

const gravity = -0.018;
const jumpPower = 0.34;

// ======================================================
// WORLD
// ======================================================

const CHUNK = 16;
const RENDER = 4;

const chunks = {};
const voxels = new Map();

const geo = new THREE.BoxGeometry(1,1,1);

// ======================================================
// TERRAIN
// ======================================================

function height(x,z){

  return Math.floor(

    Math.sin(x * 0.05) * 6 +
    Math.cos(z * 0.05) * 6 +
    Math.sin((x+z) * 0.025) * 4 +
    Math.sin(x * 0.2) * 1.5 +
    12
  );
}

// ======================================================
// TEXTURE GENERATOR
// ======================================================

function makeTexture(base, dark, light){

  const c = document.createElement("canvas");

  c.width = 128;
  c.height = 128;

  const g = c.getContext("2d");

  g.fillStyle = base;
  g.fillRect(0,0,128,128);

  // noise
  for(let i=0;i<2500;i++){

    g.fillStyle = `rgba(0,0,0,${Math.random()*0.08})`;

    g.fillRect(
      Math.random()*128,
      Math.random()*128,
      2,
      2
    );
  }

  // highlights
  for(let i=0;i<1000;i++){

    g.fillStyle = `rgba(255,255,255,${Math.random()*0.05})`;

    g.fillRect(
      Math.random()*128,
      Math.random()*128,
      1,
      1
    );
  }

  // darker patches
  for(let i=0;i<100;i++){

    g.globalAlpha = 0.12;

    g.fillStyle = dark;

    g.fillRect(
      Math.random()*128,
      Math.random()*128,
      Math.random()*20,
      Math.random()*20
    );
  }

  // brighter patches
  for(let i=0;i<50;i++){

    g.globalAlpha = 0.06;

    g.fillStyle = light;

    g.fillRect(
      Math.random()*128,
      Math.random()*128,
      Math.random()*25,
      Math.random()*25
    );
  }

  const tex = new THREE.CanvasTexture(c);

  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;

  return tex;
}

// ======================================================
// MATERIALS
// ======================================================

const mats = {

  grass:new THREE.MeshStandardMaterial({
    map:makeTexture("#4CAF50","#2E7D32","#81C784"),
    roughness:0.95
  }),

  dirt:new THREE.MeshStandardMaterial({
    map:makeTexture("#8B5A2B","#5D4037","#A1887F"),
    roughness:1
  }),

  stone:new THREE.MeshStandardMaterial({
    map:makeTexture("#888","#555","#BBB"),
    roughness:0.88,
    metalness:0.05
  })
};

// ======================================================
// BLOCKS
// ======================================================

function key(x,y,z){

  return `${x},${y},${z}`;
}

function addBlock(x,y,z,type){

  const mesh = new THREE.Mesh(
    geo,
    mats[type]
  );

  mesh.position.set(x,y,z);

  mesh.castShadow = true;
  mesh.receiveShadow = true;

  scene.add(mesh);

  voxels.set(key(x,y,z), mesh);

  return mesh;
}

// ======================================================
// CHUNKS
// ======================================================

function buildChunk(cx,cz){

  const id = `${cx},${cz}`;

  if(chunks[id]) return;

  const list = [];

  for(let x=0;x<CHUNK;x++){
    for(let z=0;z<CHUNK;z++){

      const wx = cx * CHUNK + x;
      const wz = cz * CHUNK + z;

      const h = height(wx,wz);

      for(let y=0;y<h;y++){

        let type = "stone";

        if(y === h-1){

          type = "grass";
        }
        else if(y > h-4){

          type = "dirt";
        }

        list.push(
          addBlock(wx,y,wz,type)
        );
      }
    }
  }

  chunks[id] = list;
}

// ======================================================
// UNLOAD
// ======================================================

function unloadChunks(cx,cz){

  for(let id in chunks){

    const [x,z] = id.split(",").map(Number);

    if(
      Math.abs(x-cx) > RENDER ||
      Math.abs(z-cz) > RENDER
    ){

      chunks[id].forEach(block=>{

        scene.remove(block);

        voxels.delete(
          key(
            block.position.x,
            block.position.y,
            block.position.z
          )
        );
      });

      delete chunks[id];
    }
  }
}

// ======================================================
// INPUT
// ======================================================

document.addEventListener("keydown", e=>{

  keys[e.code] = true;
});

document.addEventListener("keyup", e=>{

  keys[e.code] = false;
});

// ======================================================
// MOUSE LOOK
// ======================================================

let yaw = 0;
let pitch = 0;

document.addEventListener("click", ()=>{

  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{

  if(document.pointerLockElement){

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(
      -1.5,
      Math.min(1.5,pitch)
    );

    playerYaw.rotation.y = yaw;
    playerPitch.rotation.x = pitch;
  }
});

// ======================================================
// COLLISION
// ======================================================

function solid(x,y,z){

  return voxels.has(
    key(
      Math.round(x),
      Math.round(y),
      Math.round(z)
    )
  );
}

function collides(x,y,z){

  return (
    solid(x,y,z) ||
    solid(x,y+1,z)
  );
}

// ======================================================
// PLAYER UPDATE
// ======================================================

function updatePlayer(){

  const speed =
    keys["ShiftLeft"]
    ? sprintSpeed
    : walkSpeed;

  // =========================================
  // CORRECT MOVEMENT:
  // W = FORWARD
  // S = BACKWARD
  // A = LEFT
  // D = RIGHT
  // =========================================

  const forward =
    (keys["KeyW"] ? 1 : 0) -
    (keys["KeyS"] ? 1 : 0);

  const strafe =
    (keys["KeyD"] ? 1 : 0) -
    (keys["KeyA"] ? 1 : 0);

  const sin = Math.sin(yaw);
  const cos = Math.cos(yaw);

  let dx =
    sin * forward +
    cos * strafe;

  let dz =
    cos * forward -
    sin * strafe;

  const len = Math.hypot(dx,dz);

  if(len > 0){

    dx /= len;
    dz /= len;
  }

  vel.x += dx * accel;
  vel.z += dz * accel;

  const vlen = Math.hypot(
    vel.x,
    vel.z
  );

  if(vlen > speed){

    vel.x =
      vel.x / vlen * speed;

    vel.z =
      vel.z / vlen * speed;
  }

  vel.x *= friction;
  vel.z *= friction;

  // X COLLISION

  let nx = player.x + vel.x;

  if(!collides(nx,player.y,player.z)){

    player.x = nx;
  }

  // Z COLLISION

  let nz = player.z + vel.z;

  if(!collides(player.x,player.y,nz)){

    player.z = nz;
  }

  // JUMP

  if(
    keys["Space"] &&
    player.onGround
  ){

    player.vy = jumpPower;

    player.onGround = false;
  }

  // GRAVITY

  player.vy += gravity;

  let ny = player.y + player.vy;

  if(
    !collides(
      player.x,
      ny,
      player.z
    )
  ){

    player.y = ny;
  }
  else{

    if(player.vy < 0){

      player.onGround = true;
    }

    player.vy = 0;
  }

  // TERRAIN SAFETY

  const ground =
    height(player.x,player.z);

  if(player.y < ground){

    player.y = ground;

    player.vy = 0;

    player.onGround = true;
  }

  // CAMERA

  playerYaw.position.set(
    player.x,
    player.y + eyeHeight,
    player.z
  );
}

// ======================================================
// LOOP
// ======================================================

function loop(){

  requestAnimationFrame(loop);

  const cx =
    Math.floor(player.x / CHUNK);

  const cz =
    Math.floor(player.z / CHUNK);

  for(let x=-RENDER;x<=RENDER;x++){
    for(let z=-RENDER;z<=RENDER;z++){

      buildChunk(
        cx+x,
        cz+z
      );
    }
  }

  unloadChunks(cx,cz);

  updatePlayer();

  renderer.render(scene,camera);
}

loop();

// ======================================================
// RESIZE
// ======================================================

window.addEventListener("resize", ()=>{

  camera.aspect =
    innerWidth / innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    innerWidth,
    innerHeight
  );
});

</script>
</body>
</html>
