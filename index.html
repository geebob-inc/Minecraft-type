<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Game - Better Graphics</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px;
    font-family:monospace;
}
</style>
</head>
<body>

<div id="ui">
WASD Move<br>
Mouse Look<br>
Space Jump
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ======================
// SCENE
// ======================

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xaad5ff, 0.02);

// SKY DOME
const skyGeo = new THREE.SphereGeometry(500, 32, 32);
const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
        top: { value: new THREE.Color(0x4da6ff) },
        bottom: { value: new THREE.Color(0xe6f4ff) }
    },
    vertexShader: `
        varying vec3 vPos;
        void main(){
            vPos = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
    `,
    fragmentShader: `
        uniform vec3 top;
        uniform vec3 bottom;
        varying vec3 vPos;
        void main(){
            float h = normalize(vPos).y;
            gl_FragColor = vec4(mix(bottom, top, max(h,0.0)),1.0);
        }
    `
});

scene.add(new THREE.Mesh(skyGeo, skyMat));

// ======================
// CAMERA
// ======================

const camera = new THREE.PerspectiveCamera(
    75,
    innerWidth/innerHeight,
    0.1,
    1000
);

camera.position.set(10, 20, 10);

// ======================
// RENDERER (BETTER LOOK)
// ======================

const renderer = new THREE.WebGLRenderer({ antialias:true });

renderer.setSize(innerWidth, innerHeight);

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;

document.body.appendChild(renderer.domElement);

// ======================
// LIGHTING
// ======================

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff2cc, 2);
sun.position.set(50, 80, 20);

sun.castShadow = true;

sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;

scene.add(sun);

// ======================
// WORLD
// ======================

const world = new Map();
const key = (x,y,z)=>`${x},${y},${z}`;

const blocks = [];

function addBlock(x,y,z,color){

    const geo = new THREE.BoxGeometry(1,1,1);

    const mat = new THREE.MeshStandardMaterial({
        color,
        roughness:0.95
    });

    const cube = new THREE.Mesh(geo,mat);

    cube.position.set(x,y,z);

    cube.castShadow = true;
    cube.receiveShadow = true;

    scene.add(cube);
    blocks.push(cube);

    world.set(key(x,y,z), true);
}

// ======================
// TERRAIN (SMOOTHER)
// ======================

for(let x=0;x<50;x++){
for(let z=0;z<50;z++){

    const h =
        Math.floor(
            Math.sin(x*0.15) *
            Math.cos(z*0.15) * 5 + 10
        );

    for(let y=0;y<h;y++){

        let color = 0x8B5A2B;

        if(y === h-1) color = 0x4CAF50;

        addBlock(x,y,z,color);
    }
}}

// ======================
// CLOUDS
// ======================

function cloud(x,y,z){

    const mat = new THREE.MeshStandardMaterial({
        color:0xffffff,
        roughness:1
    });

    for(let i=0;i<6;i++){

        const c = new THREE.Mesh(
            new THREE.BoxGeometry(4,2,3),
            mat
        );

        c.position.set(
            x + Math.random()*6,
            y + Math.random()*2,
            z + Math.random()*4
        );

        scene.add(c);
    }
}

for(let i=0;i<15;i++){

    cloud(
        Math.random()*150-75,
        35+Math.random()*10,
        Math.random()*150-75
    );
}

// ======================
// INPUT
// ======================

const keys = {};

addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
});

addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

// ======================
// LOOK
// ======================

let yaw = 0;
let pitch = 0;

document.body.addEventListener("click",()=>{
    document.body.requestPointerLock();
});

document.addEventListener("mousemove",e=>{

    if(document.pointerLockElement !== document.body)
        return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(-1.5, Math.min(1.5,pitch));
});

// ======================
// MOVEMENT
// ======================

let velY = 0;
let onGround = false;

function update(){

    let speed = keys["shift"] ? 0.2 : 0.12;

    let fx = -Math.sin(yaw);
    let fz = -Math.cos(yaw);

    let rx = Math.cos(yaw);
    let rz = -Math.sin(yaw);

    if(keys["w"]){
        camera.position.x += fx * speed;
        camera.position.z += fz * speed;
    }

    if(keys["s"]){
        camera.position.x -= fx * speed;
        camera.position.z -= fz * speed;
    }

    if(keys["a"]){
        camera.position.x -= rx * speed;
        camera.position.z -= rz * speed;
    }

    if(keys["d"]){
        camera.position.x += rx * speed;
        camera.position.z += rz * speed;
    }

    // gravity
    velY -= 0.015;
    camera.position.y += velY;

    if(camera.position.y < 12){
        camera.position.y = 12;
        velY = 0;
        onGround = true;
    }

    if(keys[" "] && onGround){
        velY = 0.3;
        onGround = false;
    }

    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
}

// ======================
// LOOP
// ======================

function animate(){

    requestAnimationFrame(animate);

    update();

    renderer.render(scene,camera);
}

animate();

// ======================
// RESIZE
// ======================

addEventListener("resize",()=>{

    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
</html>
