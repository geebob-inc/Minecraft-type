<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine Combat Upgrade</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
#ui{
position:absolute;
top:10px;left:10px;
color:white;
background:#0008;
padding:10px;
font-family:monospace;
}
</style>
</head>
<body>

<div id="ui">
LMB = Attack / Mine<br>
WASD = Move | Space = Jump
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

//////////////////////////////
// ENGINE CORE
//////////////////////////////

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xaad5ff,50,160);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,30,0);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(80,120,40);
scene.add(sun);

//////////////////////////////
// WORLD
//////////////////////////////

const SIZE=16;
const world=new Map();
const chunks=new Map();

function key(x,y,z){return x+","+y+","+z}
function height(x,z){
return Math.floor(Math.sin(x*0.08)*Math.cos(z*0.08)*7+14);
}

//////////////////////////////
// PLAYER + WEAPON SYSTEM
//////////////////////////////

const player={
hp:20,
weapon:"sword",
cooldown:0
};

let yaw=0,pitch=0;
let vy=0,onGround=false;

const keys={};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

addEventListener("mousemove",e=>{
if(document.pointerLockElement!==document.body)return;
yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;
pitch=Math.max(-1.4,Math.min(1.4,pitch));
});

//////////////////////////////
// MOBS (WITH HP)
//////////////////////////////

const mobs=[];

function spawnMob(){

const m=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0x33ff33})
);

m.position.set(Math.random()*40-20,30,Math.random()*40-20);

scene.add(m);

mobs.push({
mesh:m,
hp:3,
dir:Math.random()*Math.PI*2
});

}

for(let i=0;i<10;i++)spawnMob();

//////////////////////////////
// BLOCK STORAGE
//////////////////////////////

function solid(x,y,z){
return y < height(x,z);
}

function collide(x,y,z){

for(let dx=-0.3;dx<=0.3;dx+=0.3){
for(let dz=-0.3;dz<=0.3;dz+=0.3){
for(let dy=0;dy<1.8;dy+=0.5){

if(solid(x+dx,y-dy,z+dz))return true;

}}}
return false;

}

//////////////////////////////
// COMBAT SYSTEM
//////////////////////////////

function attack(){

if(player.cooldown>0)return;

player.cooldown=12;

const ray=new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(0,0),camera);

// 🐄 HIT MOBS FIRST
for(let i=0;i<mobs.length;i++){

let m=mobs[i];

if(m.mesh.position.distanceTo(camera.position)<4){

m.hp-=1;

// knockback
m.mesh.position.x+=Math.sin(yaw)*0.6;
m.mesh.position.z+=Math.cos(yaw)*0.6;

if(m.hp<=0){
scene.remove(m.mesh);
mobs.splice(i,1);
}

return;
}

}

// 🧱 OTHERWISE BREAK BLOCK
const hit=ray.intersectObjects(scene.children,true)[0];

if(hit){

let p=hit.object.position;

world.delete(key(
Math.floor(p.x),
Math.floor(p.y),
Math.floor(p.z)
));

hit.object.visible=false;

}

}

addEventListener("mousedown",e=>{
if(e.button===0) attack();
});

//////////////////////////////
// PLAYER UPDATE
//////////////////////////////

function updatePlayer(){

let sp=0.13;

let fx=-Math.sin(yaw);
let fz=-Math.cos(yaw);

let nx=camera.position.x;
let nz=camera.position.z;

if(keys["w"]){nx+=fx*sp;nz+=fz*sp;}
if(keys["s"]){nx-=fx*sp;nz-=fz*sp;}
if(keys["a"]){nx-=Math.cos(yaw)*sp;nz+=Math.sin(yaw)*sp;}
if(keys["d"]){nx+=Math.cos(yaw)*sp;nz-=Math.sin(yaw)*sp;}

if(!collide(nx,camera.position.y,nz)){
camera.position.x=nx;
camera.position.z=nz;
}

vy-=0.02;
let ny=camera.position.y+vy;

if(!collide(camera.position.x,ny,camera.position.z)){
camera.position.y=ny;
onGround=false;
}else{
vy=0;
onGround=true;
}

if(keys[" "]&&onGround){
vy=0.3;
onGround=false;
}

camera.rotation.order="YXZ";
camera.rotation.y=yaw;
camera.rotation.x=pitch;

}

//////////////////////////////
// MOB AI
//////////////////////////////

function updateMobs(){

for(let m of mobs){

m.dir+=(Math.random()-0.5)*0.05;

m.mesh.position.x+=Math.cos(m.dir)*0.03;
m.mesh.position.z+=Math.sin(m.dir)*0.03;

m.mesh.position.y=height(
m.mesh.position.x,
m.mesh.position.z
)+1;

// attack player
if(m.mesh.position.distanceTo(camera.position)<1.5){
player.hp-=0.02;
}

}

}

//////////////////////////////
// LOOP
//////////////////////////////

function animate(){

requestAnimationFrame(animate);

if(player.cooldown>0)player.cooldown--;

updatePlayer();
updateMobs();

renderer.render(scene,camera);

}

animate();

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
