<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voxel Game</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
}

canvas{
    display:block;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    width:10px;
    height:10px;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

#crosshair::before,
#crosshair::after{
    content:"";
    position:absolute;
    background:white;
}

#crosshair::before{
    width:2px;
    height:20px;
    left:4px;
    top:-5px;
}

#crosshair::after{
    width:20px;
    height:2px;
    left:-5px;
    top:4px;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,.5);
    padding:10px;
}

</style>
</head>
<body>

<div id="crosshair"></div>

<div id="ui">
Click screen to lock mouse<br>
WASD = Move<br>
Mouse = Look Around<br>
Space = Jump<br>
Shift = Sprint
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================================================
// SCENE
// =====================================================

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
    75,
    innerWidth / innerHeight,
    0.1,
    1000
);

camera.position.set(10,20,10);

const renderer = new THREE.WebGLRenderer();

renderer.setSize(innerWidth, innerHeight);

document.body.appendChild(renderer.domElement);

// =====================================================
// LIGHT
// =====================================================

scene.add(new THREE.AmbientLight(0xffffff,0.7));

const sun = new THREE.DirectionalLight(0xffffff,1);

sun.position.set(20,40,20);

scene.add(sun);

// =====================================================
// BLOCKS
// =====================================================

const world = new Map();

const key = (x,y,z)=>`${x},${y},${z}`;

function setBlock(x,y,z,color){

    world.set(key(x,y,z), color);

    const geo = new THREE.BoxGeometry(1,1,1);

    const mat = new THREE.MeshLambertMaterial({
        color
    });

    const cube = new THREE.Mesh(geo,mat);

    cube.position.set(x,y,z);

    scene.add(cube);
}

// =====================================================
// TERRAIN
// =====================================================

for(let x=0;x<40;x++){
for(let z=0;z<40;z++){

    const h = Math.floor(
        Math.sin(x * 0.2) *
        Math.cos(z * 0.2) * 3 + 8
    );

    for(let y=0;y<h;y++){

        setBlock(
            x,
            y,
            z,
            y === h-1 ? 0x55aa55 : 0x8B5A2B
        );
    }
}}

// =====================================================
// INPUT
// =====================================================

const keys = {};

addEventListener("keydown",e=>{

    keys[e.key.toLowerCase()] = true;
});

addEventListener("keyup",e=>{

    keys[e.key.toLowerCase()] = false;
});

// =====================================================
// MOUSE LOOK
// =====================================================

let yaw = 0;
let pitch = 0;

document.body.addEventListener("click",()=>{

    document.body.requestPointerLock();
});

document.addEventListener("mousemove",e=>{

    if(document.pointerLockElement !== document.body)
        return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(
        -Math.PI / 2,
        Math.min(Math.PI / 2, pitch)
    );
});

// =====================================================
// COLLISION
// =====================================================

const PLAYER_HEIGHT = 1.8;
const PLAYER_RADIUS = 0.3;

let velocityY = 0;
let onGround = false;

function solid(x,y,z){

    return world.has(
        key(
            Math.floor(x),
            Math.floor(y),
            Math.floor(z)
        )
    );
}

function collides(x,y,z){

    for(let px=-PLAYER_RADIUS; px<=PLAYER_RADIUS; px+=PLAYER_RADIUS){
    for(let pz=-PLAYER_RADIUS; pz<=PLAYER_RADIUS; pz+=PLAYER_RADIUS){
    for(let py=0; py<PLAYER_HEIGHT; py+=0.5){

        if(solid(
            x + px,
            y + py,
            z + pz
        )){
            return true;
        }

    }}}

    return false;
}

// =====================================================
// MOVEMENT
// =====================================================

function updatePlayer(){

    const speed =
        keys["shift"] ? 0.18 : 0.12;

    let moveX = 0;
    let moveZ = 0;

    const forwardX = -Math.sin(yaw);
    const forwardZ = -Math.cos(yaw);

    const rightX = Math.cos(yaw);
    const rightZ = -Math.sin(yaw);

    if(keys["w"]){

        moveX += forwardX * speed;
        moveZ += forwardZ * speed;
    }

    if(keys["s"]){

        moveX -= forwardX * speed;
        moveZ -= forwardZ * speed;
    }

    if(keys["a"]){

        moveX -= rightX * speed;
        moveZ -= rightZ * speed;
    }

    if(keys["d"]){

        moveX += rightX * speed;
        moveZ += rightZ * speed;
    }

    // X movement

    const nextX = camera.position.x + moveX;

    if(!collides(
        nextX,
        camera.position.y - PLAYER_HEIGHT,
        camera.position.z
    )){
        camera.position.x = nextX;
    }

    // Z movement

    const nextZ = camera.position.z + moveZ;

    if(!collides(
        camera.position.x,
        camera.position.y - PLAYER_HEIGHT,
        nextZ
    )){
        camera.position.z = nextZ;
    }

    // Gravity

    velocityY -= 0.012;

    const nextY = camera.position.y + velocityY;

    if(!collides(
        camera.position.x,
        nextY - PLAYER_HEIGHT,
        camera.position.z
    )){
        camera.position.y = nextY;
        onGround = false;
    }
    else{

        if(velocityY < 0){

            onGround = true;
        }

        velocityY = 0;
    }

    // Jump

    if(keys[" "] && onGround){

        velocityY = 0.25;
        onGround = false;
    }

    // Camera rotation

    camera.rotation.order = "YXZ";

    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
}

// =====================================================
// LOOP
// =====================================================

function animate(){

    requestAnimationFrame(animate);

    updatePlayer();

    renderer.render(scene,camera);
}

animate();

// =====================================================
// RESIZE
// =====================================================

addEventListener("resize",()=>{

    camera.aspect = innerWidth / innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        innerWidth,
        innerHeight
    );
});

</script>
</body>
</html>
