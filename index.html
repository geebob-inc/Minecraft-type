<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Voxel Engine - Clean FPS</title>
<style>
body { margin:0; overflow:hidden; cursor:crosshair; }
canvas { display:block; }

#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  width:6px;
  height:6px;
  background:white;
  transform:translate(-50%,-50%);
  border-radius:50%;
}
</style>
</head>
<body>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===================== SCENE =====================
const scene = new THREE.Scene();

// 🌫 atmosphere (better graphics)
scene.fog = new THREE.Fog(0xaad5ff, 15, 90);
scene.background = new THREE.Color(0x87ceeb);

// camera (NOT rotated directly anymore)
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 🌞 lighting (Minecraft feel)
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(1,2,1);
scene.add(sun);

// ===================== CAMERA RIG (FIXES TILT) =====================
const playerYaw = new THREE.Object3D();
const playerPitch = new THREE.Object3D();

playerPitch.add(camera);
playerYaw.add(playerPitch);
scene.add(playerYaw);

// ===================== PLAYER =====================
let player = { x:0,y:10,z:0,vy:0,onGround:false };

// ===================== MOVEMENT =====================
let vel = {x:0,z:0};

const maxSpeed = 0.12;
const sprintSpeed = 0.20;
const accel = 0.02;
const friction = 0.85;
const gravity = -0.015;
const jumpPower = 0.30;

// ===================== WORLD =====================
const CHUNK = 16;
const RENDER = 2;

let chunks = {};
let voxels = new Map();

const geo = new THREE.BoxGeometry(1,1,1);

// ===================== HEIGHT =====================
function height(x,z){
  return Math.floor(
    Math.sin(x*0.2)*3 +
    Math.cos(z*0.2)*3 + 7
  );
}

// ===================== TEXTURES (BETTER GRAPHICS) =====================
function tex(color){
  let c=document.createElement("canvas");
  c.width=c.height=32;
  let g=c.getContext("2d");

  g.fillStyle=color;
  g.fillRect(0,0,32,32);

  // subtle noise = better realism
  for(let i=0;i<40;i++){
    g.fillStyle="rgba(0,0,0,0.15)";
    g.fillRect(Math.random()*32,Math.random()*32,2,2);
  }

  return new THREE.CanvasTexture(c);
}

const mats = {
  grass:new THREE.MeshLambertMaterial({map:tex("#3cb043")}),
  dirt:new THREE.MeshLambertMaterial({map:tex("#8B5A2B")}),
  stone:new THREE.MeshLambertMaterial({map:tex("#777")})
};

// ===================== BLOCK =====================
function key(x,y,z){return x+","+y+","+z;}

function addBlock(x,y,z,type){
  const m=new THREE.Mesh(geo,mats[type]);
  m.position.set(x,y,z);
  scene.add(m);
  voxels.set(key(x,y,z),1);
}

// ===================== CHUNKS =====================
function buildChunk(cx,cz){

  let id=cx+","+cz;
  if(chunks[id]) return;

  let list=[];

  for(let x=0;x<CHUNK;x++){
    for(let z=0;z<CHUNK;z++){

      let wx=cx*CHUNK+x;
      let wz=cz*CHUNK+z;

      let h=height(wx,wz);

      for(let y=0;y<h;y++){
        let t="stone";
        if(y===h-1) t="grass";
        else if(y>h-3) t="dirt";

        list.push(addBlock(wx,y,wz,t));
      }
    }
  }

  chunks[id]=list;
}

// unload chunks
function unload(cx,cz){
  for(let id in chunks){
    let [x,z]=id.split(",").map(Number);
    if(Math.abs(x-cx)>RENDER||Math.abs(z-cz)>RENDER){
      chunks[id].forEach(b=>scene.remove(b));
      delete chunks[id];
    }
  }
}

// ===================== INPUT =====================
let keys={};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// ===================== MOUSE LOOK (NO TILT BUG) =====================
let yaw = 0;
let pitch = 0;

document.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement){

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(-1.2, Math.min(1.2, pitch));

    playerYaw.rotation.y = yaw;
    playerPitch.rotation.x = pitch;
  }
});

// ===================== COLLISION =====================
function solid(x,y,z){
  return voxels.has(key(Math.round(x),Math.round(y),Math.round(z)));
}

// ===================== PLAYER UPDATE =====================
function updatePlayer(){

  let speed = keys["ShiftLeft"] ? sprintSpeed : maxSpeed;

  let forward = (keys["KeyW"]?1:0)-(keys["KeyS"]?1:0);
  let strafe  = (keys["KeyD"]?1:0)-(keys["KeyA"]?1:0);

  let sin = Math.sin(yaw);
  let cos = Math.cos(yaw);

  let dx = (sin*forward + cos*strafe);
  let dz = (cos*forward - sin*strafe);

  let len = Math.sqrt(dx*dx + dz*dz);
  if(len>0){ dx/=len; dz/=len; }

  vel.x += dx * accel;
  vel.z += dz * accel;

  let vlen = Math.sqrt(vel.x*vel.x + vel.z*vel.z);
  if(vlen > speed){
    vel.x = (vel.x/vlen)*speed;
    vel.z = (vel.z/vlen)*speed;
  }

  vel.x *= friction;
  vel.z *= friction;

  let nx = player.x + vel.x;
  let nz = player.z + vel.z;

  if(!solid(nx,player.y,nz)){
    player.x = nx;
    player.z = nz;
  }

  // jump
  if(keys["Space"] && player.onGround){
    player.vy = jumpPower;
    player.onGround = false;
  }

  // gravity
  player.vy += gravity;
  player.y += player.vy;

  let ground = height(player.x,player.z);

  if(player.y < ground){
    player.y = ground;
    player.vy = 0;
    player.onGround = true;
  }

  // ✅ CAMERA FOLLOW (NO TILT EVER AGAIN)
  playerYaw.position.set(player.x, player.y, player.z);
}

// ===================== LOOP =====================
function loop(){

  requestAnimationFrame(loop);

  let cx = Math.floor(player.x / CHUNK);
  let cz = Math.floor(player.z / CHUNK);

  for(let x=-RENDER;x<=RENDER;x++){
    for(let z=-RENDER;z<=RENDER;z++){
      buildChunk(cx+x,cz+z);
    }
  }

  unload(cx,cz);

  updatePlayer();

  renderer.render(scene,camera);
}

loop();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
